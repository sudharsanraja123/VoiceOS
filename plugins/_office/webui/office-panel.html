<html>
<head>
  <script type="module">
    import { store } from "/plugins/_office/webui/office-store.js";
  </script>
</head>
<body>
  <div class="office-panel" x-data x-create="$store.office.onMount($el, xAttrs($el) || {})" x-destroy="$store.office.cleanup()">
    <template x-if="$store.office">
      <div class="office-shell">
        <div class="office-toolbar">
          <div class="office-toolbar-row is-primary">
            <div class="office-tool-group">
              <button type="button" class="office-icon-button" title="Open" aria-label="Open" @click="$store.office.openFileBrowser()">
                <span class="material-symbols-outlined">folder_open</span>
              </button>
            </div>

            <div class="office-tool-group">
              <button type="button" class="office-icon-button office-command-button" aria-label="New Markdown" @click="$store.office.create('document', 'md')">
                <span class="material-symbols-outlined">article</span>
                <span class="office-button-label">Markdown</span>
              </button>
              <button type="button" class="office-icon-button office-command-button" aria-label="New DOCX" @click="$store.office.create('document', 'docx')">
                <span class="material-symbols-outlined">description</span>
                <span class="office-button-label">DOCX</span>
              </button>
              <button type="button" class="office-icon-button office-command-button" aria-label="New spreadsheet" @click="$store.office.create('spreadsheet', 'xlsx')">
                <span class="material-symbols-outlined">table_chart</span>
                <span class="office-button-label">Spreadsheet</span>
              </button>
              <button type="button" class="office-icon-button office-command-button" aria-label="New presentation" @click="$store.office.create('presentation', 'pptx')">
                <span class="material-symbols-outlined">co_present</span>
                <span class="office-button-label">Presentation</span>
              </button>
            </div>

            <span class="office-toolbar-spacer"></span>

            <div class="office-tool-group office-tool-actions" x-show="$store.office.session && !$store.office.isDesktopSession()" style="display: none;">
              <button type="button" class="office-icon-button" title="Rename" aria-label="Rename" :disabled="$store.office.saving" @click="$store.office.renameActiveFile()">
                <span class="material-symbols-outlined">edit</span>
              </button>
              <button type="button" class="office-icon-button" title="Save" aria-label="Save" :class="{ 'is-primary': $store.office.dirty }" :disabled="$store.office.saving" @click="$store.office.save()">
                <span class="material-symbols-outlined" :class="{ spinning: $store.office.saving }" x-text="$store.office.saving ? 'progress_activity' : 'save'"></span>
              </button>
            </div>
          </div>

          <div class="office-toolbar-row is-editor" x-show="$store.office.session && $store.office.isMarkdown()" style="display: none;">
            <div class="office-tool-group">
              <button type="button" class="office-icon-button" title="Undo" aria-label="Undo" :disabled="!$store.office.canUndo()" @click="$store.office.undo()">
                <span class="material-symbols-outlined">undo</span>
              </button>
              <button type="button" class="office-icon-button" title="Redo" aria-label="Redo" :disabled="!$store.office.canRedo()" @click="$store.office.redo()">
                <span class="material-symbols-outlined">redo</span>
              </button>
            </div>

            <div class="office-tool-group">
              <button type="button" class="office-icon-button" title="Bold" aria-label="Bold" @click="$store.office.format('bold')">
                <span class="material-symbols-outlined">format_bold</span>
              </button>
              <button type="button" class="office-icon-button" title="Italic" aria-label="Italic" @click="$store.office.format('italic')">
                <span class="material-symbols-outlined">format_italic</span>
              </button>
            </div>

            <div class="office-tool-group">
              <button type="button" class="office-icon-button" title="List" aria-label="List" @click="$store.office.format('list')">
                <span class="material-symbols-outlined">format_list_bulleted</span>
              </button>
              <button type="button" class="office-icon-button" title="Numbered list" aria-label="Numbered list" @click="$store.office.format('numbered')">
                <span class="material-symbols-outlined">format_list_numbered</span>
              </button>
              <button type="button" class="office-icon-button" title="Table" aria-label="Table" @click="$store.office.format('table')">
                <span class="material-symbols-outlined">table</span>
              </button>
            </div>
          </div>
        </div>

        <div class="office-tabs" x-show="$store.office.visibleTabs().length" role="tablist" aria-label="Open documents" style="display: none;">
          <template x-for="tab in $store.office.visibleTabs()" :key="tab.tab_id">
            <div class="office-tab-shell" :class="{ 'is-active': $store.office.isActiveTab(tab), 'is-dirty': tab.dirty, 'is-system': $store.office.isDesktopSession(tab) }">
              <button type="button" class="office-tab" role="tab" :aria-selected="$store.office.isActiveTab(tab).toString()" :title="$store.office.tabLabel(tab)" @click="$store.office.selectTab(tab.tab_id)">
                <span class="material-symbols-outlined office-tab-icon" aria-hidden="true" x-text="$store.office.tabIcon(tab)"></span>
                <span class="office-tab-title" x-text="$store.office.tabTitle(tab)"></span>
              </button>
              <button type="button" class="office-tab-close" x-show="!$store.office.isDesktopSession(tab)" :title="'Close ' + $store.office.tabLabel(tab)" :aria-label="'Close ' + $store.office.tabLabel(tab)" :disabled="$store.office.loading" @click.stop="$confirmClick($event, () => $store.office.closeTab(tab.tab_id))">
                <span class="material-symbols-outlined">close</span>
              </button>
            </div>
          </template>
        </div>

        <div class="office-state-line" x-show="$store.office.message || $store.office.error || $store.office.loading" style="display: none;">
          <span class="material-symbols-outlined" :class="{ spinning: $store.office.loading }" x-text="$store.office.loading ? 'progress_activity' : ($store.office.error ? 'error' : 'check_circle')"></span>
          <span x-text="$store.office.error || $store.office.message || 'Working'"></span>
        </div>

        <div class="office-body" :class="{ 'is-source': $store.office.isMarkdown() }">
          <div class="office-editor-wrap" x-show="$store.office.session" style="display: none;">
            <div class="office-editor-scroll" :class="{ 'is-desktop': $store.office.hasOfficialOffice(), 'is-source': $store.office.isMarkdown() }" @click.self="$store.office.focusEditor()">
              <template x-if="$store.office.hasOfficialOffice()">
                <div class="office-desktop-wrap">
                  <iframe
                    class="office-desktop-frame"
                    data-office-desktop-frame
                    tabindex="0"
                    :src="$store.office.officialOfficeUrl()"
                    aria-label="Desktop"
                    allow="clipboard-read; clipboard-write; autoplay"
                    @load="$store.office.onDesktopFrameLoaded($event)"
                  ></iframe>
                </div>
              </template>

              <textarea
                class="office-source-editor"
                data-office-source
                aria-label="Markdown source"
                x-show="$store.office.isMarkdown()"
                x-model="$store.office.editorText"
                @input="$store.office.onSourceInput()"
                @blur="$store.office.flushInput()"
                spellcheck="true"
                style="display: none;"
              ></textarea>

            </div>
          </div>
        </div>
      </div>
    </template>
  </div>

  <style>
    .office-panel,
    .office-shell {
      display: flex;
      flex: 1 1 auto;
      flex-direction: column;
      width: 100%;
      height: 100%;
      min-width: 0;
      min-height: 0;
      background: var(--color-background);
      color: var(--color-text);
    }

    .office-panel {
      container-type: inline-size;
    }

    .modal-inner.office-modal {
      box-sizing: border-box;
      width: min(1120px, calc(100vw - 32px));
      height: min(820px, calc(100vh - 32px));
      min-width: min(720px, calc(100vw - 16px));
      min-height: min(520px, calc(100vh - 16px));
      max-width: none;
      max-height: none;
      resize: none;
      overflow: hidden;
      will-change: width, height, left, top;
    }

    .modal-inner.office-modal.is-resizing,
    .modal-inner.office-modal.is-dragging {
      user-select: none;
    }

    .modal-inner.office-modal.is-focus-mode {
      border-radius: 6px;
    }

    .modal-inner.office-modal .modal-scroll {
      display: flex;
      flex: 1 1 auto;
      min-height: 0;
      max-height: none;
      overflow: hidden;
      padding: 0;
    }

    .modal-inner.office-modal .modal-header {
      grid-template-columns: minmax(0, 1fr) auto auto auto;
    }

    .office-modal-input-shield {
      position: absolute;
      inset: 42px 0 0 0;
      z-index: 4;
      display: none;
      background: transparent;
    }

    .office-modal-resizer {
      position: absolute;
      z-index: 5;
      display: block;
      touch-action: none;
    }

    .office-modal-resizer.is-right {
      top: 42px;
      right: -4px;
      bottom: 12px;
      width: 10px;
      cursor: ew-resize;
    }

    .office-modal-resizer.is-bottom {
      right: 12px;
      bottom: -4px;
      left: 0;
      height: 10px;
      cursor: ns-resize;
    }

    .office-modal-resizer.is-corner {
      right: 0;
      bottom: 0;
      width: 22px;
      height: 22px;
      cursor: nwse-resize;
    }

    .office-modal-resizer.is-corner::after {
      content: "";
      position: absolute;
      right: 6px;
      bottom: 6px;
      width: 9px;
      height: 9px;
      border-right: 2px solid color-mix(in srgb, var(--color-text) 42%, transparent);
      border-bottom: 2px solid color-mix(in srgb, var(--color-text) 42%, transparent);
      border-radius: 1px;
    }

    .modal-inner.office-modal.is-focus-mode .office-modal-resizer {
      display: none;
    }

    .modal-inner.office-modal .modal-bd.office-modal-body,
    .modal-inner.office-modal .modal-bd.office-modal-body > x-component,
    .modal-inner.office-modal .modal-bd.office-modal-body > x-component > .office-panel {
      display: flex;
      flex: 1 1 auto;
      min-height: 0;
      height: 100%;
      padding: 0;
    }

    .office-toolbar {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      flex-wrap: nowrap;
      gap: 8px;
      min-height: 0;
      padding: 8px 10px;
      overflow: visible;
      border-bottom: 1px solid color-mix(in srgb, var(--color-border), transparent 20%);
      background: color-mix(in srgb, var(--color-background), var(--color-panel) 48%);
    }

    .office-toolbar-row {
      display: flex;
      align-items: center;
      flex: 0 0 auto;
      flex-wrap: wrap;
      gap: 8px;
      min-width: 0;
    }

    .office-toolbar-row.is-editor {
      gap: 6px 8px;
      padding-top: 1px;
    }

    .office-tool-group {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      flex: 0 0 auto;
      gap: 6px;
      min-width: 0;
    }

    .office-tool-actions {
      justify-content: flex-end;
    }

    .office-toolbar-spacer {
      flex: 1 1 80px;
      min-width: 0;
    }

    .office-icon-button,
    .office-tab,
    .office-tab-close {
      border: 1px solid color-mix(in srgb, var(--color-border), transparent 12%);
      border-radius: 8px;
      background: color-mix(in srgb, var(--color-panel), var(--color-background) 16%);
      color: inherit;
      transition: border-color 120ms ease, background 120ms ease, transform 120ms ease;
    }

    .office-icon-button {
      display: inline-grid;
      place-items: center;
      width: 40px;
      height: 40px;
      min-width: 40px;
      padding: 0;
    }

    .office-command-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      width: auto;
      max-width: 152px;
      padding: 0 11px;
      white-space: nowrap;
    }

    .office-command-button .office-button-label {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
    }

    .office-icon-button.is-primary {
      border-color: color-mix(in srgb, #2c7be5, var(--color-border) 20%);
      background: color-mix(in srgb, #2c7be5, var(--color-panel) 82%);
    }

    .office-icon-button.is-active {
      border-color: color-mix(in srgb, #2ca58d, var(--color-border) 24%);
      background: color-mix(in srgb, #2ca58d, var(--color-panel) 84%);
    }

    .office-icon-button:hover:not(:disabled),
    .office-tab:hover,
    .office-tab-close:hover {
      border-color: color-mix(in srgb, #2c7be5, var(--color-border) 45%);
      background: color-mix(in srgb, var(--color-panel), #2c7be5 8%);
    }

    .office-icon-button:disabled {
      cursor: default;
      opacity: 0.42;
    }

    .office-icon-button .material-symbols-outlined,
    .office-tab-icon {
      font-size: 21px;
      line-height: 1;
    }

    .office-tabs {
      display: flex;
      gap: 6px;
      min-height: 42px;
      padding: 7px 10px;
      overflow-x: auto;
      border-bottom: 1px solid color-mix(in srgb, var(--color-border), transparent 22%);
      background: color-mix(in srgb, var(--color-panel), var(--color-background) 28%);
    }

    .office-tab-shell {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 28px;
      align-items: center;
      min-width: 150px;
      max-width: 240px;
    }

    .office-tab-shell.is-system {
      grid-template-columns: minmax(0, 1fr);
      min-width: 172px;
    }

    .office-tab,
    .office-tab-close {
      height: 28px;
      min-height: 28px;
      border-radius: 7px;
    }

    .office-tab {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      border-top-right-radius: 0;
      border-bottom-right-radius: 0;
      padding: 0 8px;
      text-align: left;
    }

    .office-tab-shell.is-system .office-tab {
      border-radius: 7px;
    }

    .office-tab-close {
      display: grid;
      place-items: center;
      border-left: 0;
      border-top-left-radius: 0;
      border-bottom-left-radius: 0;
      padding: 0;
    }

    .office-tab-close .material-symbols-outlined {
      font-size: 17px;
    }

    .office-tab-shell.is-active .office-tab,
    .office-tab-shell.is-active .office-tab-close {
      border-color: color-mix(in srgb, #2c7be5, var(--color-border) 36%);
      background: color-mix(in srgb, #2c7be5, var(--color-panel) 88%);
    }

    .office-tab-shell.is-dirty .office-tab-title::after {
      content: " *";
      color: #2ca58d;
    }

    .office-tab-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 12px;
      line-height: 1;
    }

    .office-state-line {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 6px 12px;
      border-bottom: 1px solid color-mix(in srgb, var(--color-border), transparent 28%);
      color: var(--color-text-secondary);
      font-size: 12px;
    }

    .office-body {
      position: relative;
      display: flex;
      flex: 1 1 auto;
      min-height: 0;
      overflow: hidden;
      background:
        linear-gradient(90deg, rgba(44, 123, 229, 0.05), transparent 38%),
        linear-gradient(180deg, rgba(44, 165, 141, 0.04), transparent 46%),
        #eef2f7;
    }

    .office-body.is-source {
      background: transparent;
    }

    .office-editor-wrap {
      display: flex;
      flex: 1 1 auto;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
    }

    .office-editor-scroll {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      padding: 30px 24px;
    }

    .office-editor-scroll.is-source {
      display: flex;
      overflow: hidden;
      padding: var(--spacing-md);
      background: transparent;
    }

    .office-editor-scroll.is-desktop {
      display: flex;
      overflow: hidden;
      padding: 0;
      background: #1f2329;
    }

    .office-desktop-wrap {
      display: flex;
      flex: 1 1 auto;
      width: 100%;
      height: 100%;
      min-width: 0;
      min-height: 0;
      aspect-ratio: auto;
      background: #1f2329;
    }

    .office-desktop-frame {
      flex: 1 1 auto;
      width: 100%;
      height: 100%;
      min-height: 0;
      aspect-ratio: auto;
      border: 0;
      background: #20242a;
    }

    .office-source-editor {
      box-sizing: border-box;
      flex: 1 1 auto;
      width: 100%;
      height: 100%;
      min-width: 0;
      min-height: 0;
      margin: 0;
      padding: 0;
      border: 0;
      outline: none;
      background: transparent;
      box-shadow: none;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 13px;
      line-height: 1.65;
      resize: none;
    }

    textarea:focus {
      background: transparent;
      filter: brightness(1) !important;
    }

    .office-panel .spinning {
      animation: office-spin 0.8s linear infinite;
    }

    @keyframes office-spin {
      to { transform: rotate(360deg); }
    }

    @container (max-width: 680px) {
      .office-toolbar {
        gap: 6px;
        padding-inline: 8px;
      }

      .office-toolbar-row {
        gap: 6px;
      }

      .office-command-button {
        max-width: 132px;
        padding-inline: 9px;
      }

    }
  </style>
</body>
</html>
